
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap');

  :root {
    --green: #00a884;
    --green-dark: #008069;
    --bg: #111b21;
    --bg2: #202c33;
    --surface: #1f2c34;
    --border: #2a3942;
    --text: #e9edef;
    --text-muted: #8696a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ICON CIRCLE */
  .icon-wrap {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--bg2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .icon-wrap svg {
    width: 42px;
    height: 42px;
    fill: var(--green);
  }

  /* 404 NUMBER */
  .code {
    font-size: clamp(64px, 18vw, 96px);
    font-weight: 700;
    color: var(--green);
    line-height: 1;
    margin-bottom: 12px;
    letter-spacing: -0.03em;
  }

  /* TITLE */
  .title {
    font-size: clamp(18px, 5vw, 22px);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }

  /* SUBTITLE */
  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.65;
    max-width: 300px;
    margin-bottom: 36px;
  }

  /* DIVIDER */
  .divider {
    width: 40px;
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 36px;
  }

  /* BUTTON */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 12px 28px;
    font-family: 'Noto Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s, transform .15s;
    margin-bottom: 16px;
  }
  .btn:hover { background: var(--green); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn svg { width: 17px; height: 17px; fill: #fff; }

  /* BACK LINK */
  .back {
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color .2s;
  }
  .back:hover { color: var(--text); }

  /* FOOTER */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .footer svg { width: 14px; height: 14px; fill: var(--green); flex-shrink: 0; }
  .footer-text {
    font-size: 12px;
    color: var(--text-muted);
  }
  .footer-text span { color: var(--green); font-weight: 600; }

  @media (max-width: 360px) {
    .btn { padding: 11px 22px; font-size: 14px; }
  }
</style>
</head>
<body>

  <!-- ICON -->
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
  </div>

  <!-- 404 -->
  <div class="code">404</div>

  <!-- TITLE + SUBTITLE -->
  <div class="title">Page Not Found</div>
  <div class="divider"></div>
  <p class="subtitle">The page you're looking for doesn't exist or may have been moved.</p>

  <!-- ACTIONS -->
  <!-- <a href="/" class="btn">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Go to Home
  </a>
  <button class="back" onclick="history.back()">Go back</button> -->

  <!-- FOOTER -->
  <div class="footer">
    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
    <div class="footer-text">Your connection is <span>end-to-end encrypted</span></div>
  </div>

</body>
</html>
